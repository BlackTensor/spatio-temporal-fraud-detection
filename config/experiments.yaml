# Phase 11.3 — Experiment configuration (single source of truth)
# =============================================================================
# Every hyperparameter, seed, and split boundary used to produce the project's
# results is recorded here. The training scripts hard-code the same values
# (see `defined_in` per block); this file documents them in one place so a fresh
# clone can be reproduced and audited. Validated by:
#     python -m src.evaluation.reproducibility   -> results/reproducibility_check.md
# =============================================================================

seed: 42                      # torch.manual_seed + numpy.random.seed in every script
device: cpu                   # dev machine is Windows-on-ARM, no NVIDIA GPU
determinism_note: >
  Full-batch transductive training on CPU with a fixed seed is deterministic
  run-to-run. GAT dropout-in-attention and GRU temporal state are all seeded.
  No CUDA nondeterminism applies (CPU only).

environment:
  python: "3.14"
  platform: "Windows-on-ARM (Snapdragon 8cx Gen 3), no GPU"
  install: "pip install --only-binary=:all: -r requirements.txt"
  key_versions:                # pinned in requirements.txt
    torch: "2.12.0"            # CPU build
    torch_geometric: "2.8.0"
    numpy: "2.4.6"
    scikit_learn: "1.9.0"
    xgboost: "3.2.0"
  free_gpu_fallback: "notebooks/colab_setup.ipynb (Colab/Kaggle free GPU)"

dataset:
  name: "Elliptic Bitcoin Dataset"
  source: "PyG mirror data.pyg.org/datasets/elliptic (Kaggle API fallback)"
  acquire: "python -m src.data.download_elliptic"
  n_nodes: 203769
  n_edges: 234355
  n_features: 169            # 165 original + in/out/total degree + time_step_norm
  n_time_steps: 49
  node_type: "single (Bitcoin transactions) — homogeneous"
  label_encoding: "illicit(class 1)->1, licit(class 2)->0, unknown->-1 (masked)"
  class_imbalance: "≈9:1 licit:illicit among labeled nodes"

# Temporal split — no label leakage (Phase 1.5). Boundaries follow the original
# Elliptic paper (train = ts 1-34). Full graph is visible to all splits
# (transductive); only train labels drive gradient updates.
split:
  strategy: "temporal (by time step) — no leakage"
  defined_in: "src/data/temporal_split.py -> data/processed/splits.json + splits.pt"
  time_step_ranges:
    train: [1, 34]
    val:   [35, 42]
    test:  [43, 49]
  counts:
    train: {n_nodes: 136265, n_labeled: 29894, n_illicit: 3462, illicit_pct_labeled: 11.58}
    val:   {n_nodes: 37820,  n_labeled: 9983,  n_illicit: 914,  illicit_pct_labeled: 9.16}
    test:  {n_nodes: 29684,  n_labeled: 6687,  n_illicit: 169,  illicit_pct_labeled: 2.53}
  concept_drift: "illicit prevalence collapses 11.6% -> 9.2% -> 2.5% across train/val/test"

# pos_weight = n_licit/n_illicit on train-labeled nodes (handles 9:1 imbalance).
# Phase 10.4 found sqrt(inv-freq)≈2.76 generalises better, but the canonical
# checkpoints use the full inverse-frequency value below.
loss:
  type: "BCEWithLogitsLoss"
  pos_weight: 7.635

# -----------------------------------------------------------------------------
# Hyperparameters per model family. Threshold is tuned on val (F1-optimal),
# applied unchanged to test — no leakage. Early stopping monitors val AUC/F1.
# -----------------------------------------------------------------------------
models:

  xgboost:                          # Phase 2 — defined_in: src/models/baseline_xgboost.py
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.1
    min_child_weight: 1
    scale_pos_weight: 7.63          # grid-searched on val
    note: "best of a small grid; threshold from val PR curve (F1-optimal)"

  static_gnn:                       # Phase 4 — defined_in: src/models/static_gnn_train.py (HP)
    applies_to: [gcn, graphsage, gat]
    hidden_channels: 64
    dropout: 0.3
    heads: 2                        # GAT only
    lr: 0.01
    weight_decay: 0.0005
    max_epochs: 300
    patience: 30                    # early stopping on val metric
    optimizer: Adam

  temporal_gnn:                     # Phase 5 — defined_in: src/models/temporal_gnn_train.py (HP)
    applies_to: [temporal_snapshot_gnn, evolve_gcn]
    hidden_channels: 64
    dropout: 0.3
    lr: 0.005
    weight_decay: 0.0005
    max_epochs: 200
    patience: 25
    truncated_bptt: 1               # TBPTT-1 across snapshots (CPU constraint)

  hetero_static:                    # Phase 6.1 — defined_in: src/models/hetero_gnn_train.py (HP_STATIC)
    applies_to: [hetero_sage, hgat]
    hidden_channels: 64
    dropout: 0.3
    lr: 0.01
    weight_decay: 0.0005
    max_epochs: 300
    patience: 30
    edge_types: ["(transaction, sends, transaction)", "(transaction, receives, transaction)"]

  hetero_temporal:                  # Phase 6.2 — defined_in: src/models/hetero_gnn_train.py (HP_TEMPORAL)
    applies_to: [htgn]
    hidden_channels: 64
    dropout: 0.3
    lr: 0.005
    weight_decay: 0.0005
    max_epochs: 200
    patience: 25

# -----------------------------------------------------------------------------
# Reproduce from a clean clone (in order). Heavy training optionally on free GPU.
# -----------------------------------------------------------------------------
reproduce:
  - "pip install --only-binary=:all: -r requirements.txt"
  - "python -m src.data.download_elliptic        # Phase 1.1"
  - "python -m src.data.preprocess_elliptic      # Phase 1.3"
  - "python -m src.data.feature_engineering      # Phase 1.4"
  - "python -m src.data.temporal_split           # Phase 1.5"
  - "python -m src.data.build_graph              # Phase 3.1 -> graph.pt"
  - "python -m src.models.baseline_xgboost       # Phase 2"
  - "python -m src.models.static_gnn_train       # Phase 4"
  - "python -m src.models.temporal_gnn_train     # Phase 5"
  - "python -m src.models.hetero_gnn_train       # Phase 6"
  - "python -m src.evaluation.comprehensive_eval # Phase 8"
  - "python -m src.evaluation.reproducibility    # Phase 11.3 — verify"
